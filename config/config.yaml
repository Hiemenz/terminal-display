# Terminal Display Configuration
# 800x480 Waveshare 7.5" V2 e-ink display

# Custom label shown on stats screen (leave empty to use hostname)
device_label: ""

# Dark mode: black background, white text (recommended for terminal aesthetic)
dark_mode: false

# How often to refresh (seconds)
update_interval: 30

# Night mode: skip refreshes between night_start and night_end (24-hour format)
night_mode: true
night_start: 2
night_end: 7

# Timezone for time display (IANA string)
timezone: America/Chicago

# Which panels to show (set to false to hide)
show_time: true
show_cpu: true
show_memory: true
show_disk: true
show_network: true
show_top_processes: true
show_load: true

# Disk path to monitor
disk_path: /

# Network interface to monitor (empty = auto-detect)
network_interface: ""

# Speedtest interval: run a real speedtest.net test every N seconds (default 20 min)
# Set to 0 to disable speedtest and fall back to local throughput sampling.
speedtest_interval: 1200

# Number of top processes to show
top_process_count: 5

# Font paths (falls back to PIL default if not found)
# Leave empty to use auto-detected system monospace font
font_path: ""

# ── Terminal emulator settings ──────────────────────────────────────────────
# Font size for terminal text (pt). Determines cols×rows that fit on screen.
#   8pt  → ~133 cols × 40 rows  (very small)
#   12pt → ~114 cols × 34 rows  (small)
#   14pt → ~100 cols × 28 rows  (default — good balance)
#   16pt →  ~88 cols × 24 rows  (comfortable)
#   20pt →  ~66 cols × 20 rows  (large, easy to read from a distance)
terminal_font_size: 14

# Path to a monospace TTF for the terminal (empty = auto-detect)
terminal_font_path: ""

# Dark mode for the terminal — inherits global dark_mode if not set here
terminal_dark_mode: false

# Seconds of active use between full (flash) refreshes that clear ghosting.
# Partial (no-flash) updates are used in between. 0 = disabled.
terminal_full_refresh_interval: 120

# Force a full refresh after this many partial refreshes to clear ghosting,
# regardless of how much time has elapsed.
partial_refresh_before_full: 30

# Keyboard device path ('auto' = auto-detect, '' = stdin only).
# Set to a specific /dev/input/eventN to force a device.
terminal_keyboard_device: auto

# Prefer Bluetooth keyboards over USB when auto-detecting.
terminal_keyboard_prefer_bluetooth: false

# tmux: attach to (or create) a named tmux session so shell state survives
# app restarts. Sessions do NOT survive reboots without tmux-resurrect.
terminal_use_tmux: true
terminal_tmux_session: eink

# Scrollback history (lines). PgUp/PgDn to scroll (no-tmux mode only;
# with tmux, use Ctrl+B [ to enter copy mode).
terminal_scrollback: 500

# Idle screensaver: switch to stats after N seconds of no keyboard activity.
# Set to 0 to disable.
terminal_idle_timeout: 900

# (removed — idle refreshes are no longer done; the display sleeps on screensaver instead)

# Show QR code in terminal corner (URL of current page or web UI link)
terminal_show_qr: true

# Status bar extras: show current time, working directory, and git branch.
terminal_status_bar_extras: true

# Status bar item toggles (all default on)
terminal_status_bar_show_time: true
terminal_status_bar_show_cwd: true
terminal_status_bar_show_ip: true
terminal_status_bar_show_speed: true

# Compact status bar: shorten labels (C:/M:/D:/L:) and drop uptime/sizes.
# Full:    14:30  |  CPU 15%  |  MEM 1.2g 62%  |  Disk 12g/32g 38%  |  Load 0.52  |  Up 2h  |  192.168.1.145
# Compact: 14:30  C:15%  M:62%  D:38%  L:0.52  192.168.1.145
terminal_status_bar_compact: true

# Split view: 600px terminal on the left, 200px live stats on the right.
terminal_split_view: false

# Alert thresholds (0 = disabled)
terminal_alert_cpu_threshold: 90
terminal_alert_disk_free_threshold: 10
terminal_alert_ssh_logins: true

# High-quality rendering: render at 2× then downsample (sharper text on e-ink).
# Adds ~15ms to render time — negligible vs. display refresh time.
terminal_hq_render: true

# Paste file: F8 reads this file and types its contents into the terminal.
# SSH in from another device, save text here, press F8 to paste.
terminal_paste_file: ~/eink-paste.txt

# ── HTTP preview server ──────────────────────────────────────────────────────
# Serves the current display as PNG on the LAN. Open http://<pi-ip>:8080/
# in any browser to see a live auto-refreshing view of the e-ink display.
preview_server_enabled: true
preview_server_port: 8080

# ── Stats dashboard settings ─────────────────────────────────────────────────
# Show QR code for primary IP address in the bottom-right of the stats screen.
show_qr_code: true

# ── Screensaver / idle mode ──────────────────────────────────────────────────
# When no SSH session or web activity is detected for screensaver_idle_timeout
# seconds, switch to the screensaver image with a QR code overlay.
# Scanning the QR code opens the web UI and immediately wakes stats display.
screensaver_enabled: true

# Seconds of inactivity before switching to the screensaver (default 1 hour).
screensaver_idle_timeout: 3600

# Path to the screensaver background image (JPG, PNG, etc.).
# Place your image here and it will be converted to grayscale for the e-ink panel.
# Relative paths are resolved from the project root.
screensaver_image_path: "assets/test.jpg"

# 'static' = one image, 'cycle' = rotate through gallery, 'mlb' = MLB scores & standings
screensaver_mode: static
screensaver_cycle_interval: 5

# MLB screensaver: favorite team abbreviation to highlight (e.g. 'CHC', 'NYY', 'LAD')
screensaver_mlb_team: ""

# ── System overlay services (F4 service manager) ─────────────────────────────
terminal_services:
  - eink-display
  - ssh
  - nginx

# ── SSH bookmarks for F1 quick-connect (opens new tab) ───────────────────────
# terminal_ssh_bookmarks:
#   - name: "homelab"
#     host: "192.168.1.100"
#     user: "pi"
#     port: 22

# ── Startup mode (used by systemd service) ───────────────────────────────────
# 'terminal' = launch eink_terminal.py on boot
# 'stats'    = launch main.py (stats dashboard) on boot
startup_mode: terminal

# How many seconds to show command output before returning to stats dashboard
command_display_seconds: 15
